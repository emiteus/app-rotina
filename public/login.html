<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Login - App Rotina</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
      background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
      min-height: 100vh;
      display: flex;
      justify-content: center;
      align-items: center;
    }

    .login-container {
      background: white;
      padding: 40px;
      border-radius: 12px;
      box-shadow: 0 20px 60px rgba(0, 0, 0, 0.3);
      width: 100%;
      max-width: 400px;
    }

    h1 {
      text-align: center;
      margin-bottom: 30px;
      color: #1f2937;
      font-size: 28px;
    }

    .form-group {
      margin-bottom: 20px;
    }

    label {
      display: block;
      margin-bottom: 8px;
      color: #4b5563;
      font-weight: 500;
    }

    input {
      width: 100%;
      padding: 12px;
      border: 2px solid #e5e7eb;
      border-radius: 6px;
      font-size: 14px;
      transition: border-color 0.3s;
    }

    input:focus {
      outline: none;
      border-color: #667eea;
    }

    button {
      width: 100%;
      padding: 12px;
      background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
      color: white;
      border: none;
      border-radius: 6px;
      font-weight: 600;
      cursor: pointer;
      transition: transform 0.2s;
      font-size: 14px;
    }

    button:hover {
      transform: translateY(-2px);
    }

    button:active {
      transform: translateY(0);
    }

    .erro {
      color: #ef4444;
      font-size: 13px;
      margin-top: 10px;
      text-align: center;
      display: none;
    }

    .erro.show {
      display: block;
    }

    .loading {
      display: none;
    }

    button.loading {
      opacity: 0.7;
      pointer-events: none;
    }
  </style>
</head>
<body>
  <div class="login-container">
    <h1>🔐 App Rotina</h1>
    <form id="form-login" onsubmit="fazerLogin(event)">
      <div class="form-group">
        <label for="senha">Senha</label>
        <input
          type="password"
          id="senha"
          placeholder="Digite sua senha"
          required
          autofocus
        />
      </div>
      <button type="submit">Entrar</button>
      <div class="erro" id="erro-msg"></div>
    </form>
  </div>

  <script>
    // Verifica se ja esta autenticado
    async function verificarAuth() {
      try {
        const res = await fetch('/api/auth/check');
        const data = await res.json();
        if (data.authenticated) {
          window.location.href = '/index.html';
        }
      } catch (err) {
        console.error('Erro ao verificar autenticacao:', err);
      }
    }

    // Faz login
    async function fazerLogin(event) {
      event.preventDefault();

      const senha = document.getElementById('senha').value;
      const btn = event.target.querySelector('button');
      const erroEl = document.getElementById('erro-msg');

      btn.classList.add('loading');
      btn.disabled = true;

      try {
        const res = await fetch('/api/auth/login', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ senha })
        });

        const data = await res.json();

        if (res.ok) {
          window.location.href = '/index.html';
        } else {
          erroEl.textContent = data.erro || 'Erro ao fazer login';
          erroEl.classList.add('show');
          btn.classList.remove('loading');
          btn.disabled = false;
        }
      } catch (err) {
        erroEl.textContent = 'Erro ao conectar com servidor';
        erroEl.classList.add('show');
        btn.classList.remove('loading');
        btn.disabled = false;
      }
    }

    // Verifica autenticacao ao carregar
    window.addEventListener('load', verificarAuth);
  </script>
</body>
</html>
